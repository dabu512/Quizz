<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ôn Luyện Trắc Nghiệm UI/UX - 50 Câu Hỏi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header with Dashboard Stats -->
    <header class="quiz-header">
      <div class="header-content">
        <div class="brand-info">
          <div class="logo-icon">✨</div>
          <div>
            <h1>Ôn Luyện Trắc Nghiệm UI/UX</h1>
            <p class="subtitle">Môn: Giao diện và Trải nghiệm Người dùng (50 Câu)</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="reset-btn" class="btn btn-outline" title="Làm lại từ đầu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Làm lại
          </button>
        </div>
      </div>

      <!-- Score Bar / Progress -->
      <div class="stats-bar">
        <div class="stat-card">
          <span class="stat-label">Đã làm</span>
          <span id="stat-completed" class="stat-value">0 / 50</span>
        </div>
        <div class="stat-card success">
          <span class="stat-label">Số câu đúng</span>
          <span id="stat-correct" class="stat-value">0</span>
        </div>
        <div class="stat-card danger">
          <span class="stat-label">Số câu sai</span>
          <span id="stat-wrong" class="stat-value">0</span>
        </div>
        <div class="stat-card primary">
          <span class="stat-label">Tỷ lệ chính xác</span>
          <span id="stat-accuracy" class="stat-value">0%</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="quiz-body">
      <!-- Left Panel: Question Navigator Grid -->
      <aside class="navigator-panel">
        <div class="panel-header">
          <h3>Thanh di chuyển câu hỏi</h3>
          <span class="legend-hint">50 câu</span>
        </div>

        <div class="legend-container">
          <div class="legend-item"><span class="badge badge-pending"></span> Chưa làm</div>
          <div class="legend-item"><span class="badge badge-correct"></span> Đúng</div>
          <div class="legend-item"><span class="badge badge-wrong"></span> Sai</div>
        </div>

        <div id="navigator-grid" class="nav-grid">
          <!-- 50 question buttons injected via JS -->
        </div>
      </aside>

      <!-- Right Panel: Question Display Card -->
      <section class="question-panel">
        <div class="card question-card">
          <!-- Question Header & Type Badge -->
          <div class="q-card-header">
            <span id="q-number-badge" class="q-badge">Câu 1</span>
            <span id="q-type-badge" class="type-badge">Chọn 1 đáp án</span>
          </div>

          <!-- Question Title -->
          <h2 id="q-title" class="q-title-text">Đang tải câu hỏi...</h2>

          <!-- Options Container -->
          <div id="q-options" class="options-list">
            <!-- Options rendered via JS -->
          </div>

          <!-- Action Bar for Multi-choice questions -->
          <div id="action-bar" class="action-bar hidden">
            <button id="submit-check-btn" class="btn btn-primary btn-lg">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              Kiểm Tra Đáp Án
            </button>
          </div>

          <!-- Explanation Container (Shows after answering) -->
          <div id="explanation-box" class="explanation-box hidden">
            <div class="explanation-header">
              <span class="exp-icon">💡</span>
              <h4>Lời Giải Chi Tiết</h4>
            </div>
            <p id="explanation-text" class="exp-content"></p>
          </div>

          <!-- Footer Navigation (Prev / Next) -->
          <div class="q-card-footer">
            <button id="prev-btn" class="btn btn-secondary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
              Câu Trước
            </button>
            <span id="footer-counter" class="footer-counter">1 / 50</span>
            <button id="next-btn" class="btn btn-secondary">
              Câu Tiêu Tiếp
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Load Questions Dataset and App Logic -->
  <script src="questions_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
